seed: 42

# - DG-PPO hyper-parameters, consumed by DGPPOAgentCfg / DGPPOAgent / DGPPORunner
agent:

  # DGPPO-specific
  alpha:        15    # CBF class-K multiplier
  cbf_eps:      0.01    # CBF slack (h >= -eps is "safe enough")
  cbf_weight:   0.75     # weight on the CBF penalty term
  cbf_schedule: false   

  # Graph / observation radius for graph builder
  obs_radius: 8.0

  # PPO / GAE
  rollouts:         16       # steps collected per update (per env)
  learning_epochs:  4
  mini_batches:     8

  discount_factor:  0.995
  gae_lambda:           0.95
  bootstrap_on_truncated: false

  # Learning rates
  lr_policy: 2.0e-4
  lr_vl:     1.0e-3
  lr_vh:     1.0e-3
  # TODO: add scheduler (KLAdaptiveLR)


  # TODO: add observation and value preprocessor


  learning_starts:  0
  
  ratio_clip:       0.2
  grad_norm_clip:   2.0
  # TODO: add value_clip

  entropy_loss_scale: 0.01
  vl_loss_scale:    1.0
  vh_loss_scale:    1.0
  

  # RNN
  use_rnn: true
  rnn_step: 16
  rnn:
    cell:   gru
    hidden: 64
    layers: 1

  # GNN backbone
  gnn:
    policy_layers: 2
    vl_layers: 2
    vh_layers: 1
    policy_out_dim: 64
    critic_out_dim: 64
    msg_dim:  32
    n_heads:  3

  # MLP / policy-head architecture
  model:
    policy_mlp_hid: [64, 64]
    critic_mlp_hid: [64, 64]
    scale_hid: 64
    scale_final: 0.01
    std_dev_init: 0.5
    std_dev_min: 1.0e-5

  # TODO: add activations selection to the relevant models (ex. elu,relu, etc.)

  
  # Live-training diagnostics. This branch is intentionally debug-heavy:
  # JSONL events are written under each run's dgppo_debug/ directory.
  debug:
    enabled: true
    step_interval: 10
    update_interval: 1
    minibatch_interval: 1
    sample_env_count: 8
    log_minibatches: true
    log_jsonl: true
    log_tensorboard_scalars: true
    log_on_done: true
    rnn_done_norm_epsilon: 1.0e-6
    anomaly_abs_threshold: 1000000.0

  # skrl experiment logging
  experiment:
    directory: "training/dgppo"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: auto
    store_separately: false
    wandb: false
    wandb_kwargs:
      project: "drones_dgppo"
      entity: ""
      name: ""
      sync_tensorboard: false

# - Trainer settings, read by skrl SequentialTrainer
trainer:
  timesteps: 3000 #15000
  environment_info: log
  headless: true
  disable_progressbar: false
  close_environment_at_exit: true
