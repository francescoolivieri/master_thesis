seed: 42

# - DGPPOAgent hyper-parameters, read by DGPPOAgent.load_dgppo_hyperparameters() and DGPPORunner.__init__()
agent:

  # DGPPO-specific
  alpha:        10.0    # CBF class-K multiplier
  cbf_eps:      0.01    # CBF slack (h >= -eps is "safe enough")
  cbf_weight:   1.0     # weight on the CBF penalty term
  cbf_schedule: true    # linearly increase cbf_weight during training

  # PPO / GAE
  discount_factor:  0.99
  gae_lambda:           0.95
  rollouts:         32       # steps collected per update (per env)
  learning_epochs:  4
  learning_starts:  0
  mini_batches:     8
  ratio_clip:       0.2
  entropy_loss_scale: 0.0
  vl_loss_scale:    1.0
  vh_loss_scale:    1.0
  grad_norm_clip:   2.0

  # Learning rates
  lr_policy: 3.0e-4
  lr_vl:     1.0e-3
  lr_vh:     1.0e-3

  # Graph / observation radius for graph builder
  obs_radius: 2.0

  # RNN
  use_rnn: false
  rnn:
    cell:   gru
    hidden: 64
    layers: 1

  # GNN backbone (shared between policy and critics)
  gnn:
    policy_layers: 1
    critic_layers: 1
    out_dim:  64
    msg_dim:  32
    n_heads:  3

  # skrl experiment logging
  experiment:
    directory: "training/dgppo"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: auto
    wandb: false
    wandb_kwargs:
      project: "drones_dgppo"
      entity: ""
      name: ""

# - Trainer settings, read by skrl SequentialTrainer 
trainer:
  timesteps: 500000
  environment_info: log
  headless: true
  disable_progressbar: false
  close_environment_at_exit: true
