seed: 42

# - DG-PPO hyper-parameters, consumed by DGPPOAgentCfg / DGPPOAgent / DGPPORunner
agent:

  # DGPPO-specific
  alpha:        10.0    # CBF class-K multiplier
  cbf_eps:      0.01    # CBF slack (h >= -eps is "safe enough")
  cbf_weight:   1.0     # weight on the CBF penalty term
  cbf_schedule: true    # linearly increase cbf_weight during training

  # PPO / GAE
  discount_factor:  0.995
  gae_lambda:           0.95
  rollouts:         16       # steps collected per update (per env)
  learning_epochs:  4
  learning_starts:  0
  mini_batches:     8
  
  entropy_loss_scale: 0.0
  vl_loss_scale:    1.0
  vh_loss_scale:    1.0

  ratio_clip:       0.2
  grad_norm_clip:   2.0
  # TODO: add value_clip (skrl's clip_predicted_values) option

  # Learning rates
  lr_policy: 2.0e-4
  lr_vl:     1.0e-3
  lr_vh:     1.0e-3

  # TODO: add learning rate schedulers (e.g. KLAdaptiveLR)


  # TODO: time_limit_bootstrap

  # Graph / observation radius for graph builder
  obs_radius: 10.0
  # TODO: observation and value preprocessors (e.g. RunningStandardScaler)

  # RNN
  use_rnn: true
  rnn_step: 16
  rnn:
    cell:   gru
    hidden: 64
    layers: 1

  # GNN backbone
  gnn:
    policy_layers: 1
    critic_layers: 1
    policy_out_dim: 64
    critic_out_dim: 64
    msg_dim:  32
    n_heads:  3

  # MLP / policy-head architecture
  model:
    policy_mlp_hid: [128, 64]
    critic_mlp_hid: [128, 64]
    scale_hid: 64
    scale_final: 0.01
    std_dev_init: 0.5    # shouldn t choose min, max and init (in log space)?
    std_dev_min: 1.0e-5 
    # TODO: choose activation function (e.g. elu, relu, etc.)

  # skrl experiment logging
  experiment:
    directory: "training/dgppo"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: auto
    store_separately: false
    wandb: false
    wandb_kwargs:
      project: "drones_dgppo"
      entity: ""
      name: ""
      sync_tensorboard: false

# - Trainer settings, read by skrl SequentialTrainer
trainer:
  timesteps: 15000
  environment_info: log
  headless: true
  disable_progressbar: false
  close_environment_at_exit: true
