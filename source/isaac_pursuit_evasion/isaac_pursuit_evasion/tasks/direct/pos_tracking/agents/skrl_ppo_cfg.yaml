seed: 42

models:
  separate: True
  policy:
    class: GaussianMixin
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
      - name: net
        input: OBSERVATIONS
        layers: [512, 256, 128, 64]
        activations: elu
    output: ACTIONS
  value:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: OBSERVATIONS
        layers: [512, 256, 128, 64]
        activations: elu
    output: ONE

memory:
  class: RandomMemory
  memory_size: -1

agent:
  class: PPO

  rollouts: 16
  learning_epochs: 4
  mini_batches: 8

  discount_factor: 0.995
  gae_lambda: 0.95

  learning_rate: 2.0e-04
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.008

  observation_preprocessor: RunningStandardScaler
  observation_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null

  random_timesteps: 0
  learning_starts: 0

  grad_norm_clip: 0.5
  ratio_clip: 0.2
  value_clip: 0.2   # if >0 automatically -> clip_predicted_values: True

  entropy_loss_scale: 0.0
  value_loss_scale: 1.0

  kl_threshold: 0.0

  rewards_shaper_scale: 1.0
  time_limit_bootstrap: True

  experiment:
    directory: "training"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: auto

    wandb: true
    wandb_kwargs:
      project: "drones_rpl"
      entity: ""
      name: ""

trainer:
  class: SequentialTrainer
  timesteps: 15000
  environment_info: log
