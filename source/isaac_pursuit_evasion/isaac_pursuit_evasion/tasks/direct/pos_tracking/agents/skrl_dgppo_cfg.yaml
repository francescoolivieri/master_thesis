seed: 42

models:
  separate: True
  policy:
    class: GaussianMixin
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
      - name: net
        input: OBSERVATIONS
        layers: [512, 256, 128, 64]
        activations: elu
    output: ACTIONS
  value:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: OBSERVATIONS
        layers: [512, 256, 128, 64]
        activations: elu
    output: ONE

memory:
  class: RandomMemory
  memory_size: -1

agent:
  class: DGPPO

  rollouts: 16
  learning_epochs: 4
  mini_batches: 8

  discount_factor: 0.995
  lambda: 0.95

  learning_rate: 2.0e-04
  grad_norm_clip: 0.5
  ratio_clip: 0.2

  entropy_loss_scale: 0.0
  value_loss_scale: 1.0

  experiment:
    directory: "training"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: auto

    wandb: true
    wandb_kwargs:
      project: "drones_rpl"
      entity: ""
      name: ""

dgppo:
  n_constraint_heads: 3
  alpha: 5.0
  cbf_eps: 0.02
  cbf_weight: 1.0
  cbf_dt: 0.03
  obstacle_clearance: 0.0
  value_h_loss_scale: 1.0

trainer:
  class: SequentialTrainer
  timesteps: 15000
  environment_info: log
